<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cars</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body, html { 
            background-color: #121212; 
            color: #f8f9fa; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .header-bar {
            background: rgba(18,18,18,0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000;
            padding: 15px 0;
        }
        .breadcrumb { margin-bottom: 0; font-size: 0.9rem; }
        .breadcrumb-item a { color: #0d6efd; text-decoration: none; }
        .breadcrumb-item a:hover { color: #0a58ca; }
        .breadcrumb-item.active { color: #ccc; }
        .breadcrumb-item+.breadcrumb-item::before { color: #666; }
        
        .card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
            overflow: hidden;
            height: 100%;
        }
        a.text-decoration-none:hover .card {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border-color: #444;
        }
        
        .card-img-top-wrapper {
            height: 220px; overflow: hidden; background: #222;
            display: flex; align-items: center; justify-content: center;
        }
        .card-img-top-wrapper img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .card-img-top-wrapper i { font-size: 4rem; color: #444; }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="container">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                                                                                                        <li class="breadcrumb-item"><a href="../index.html">Home</a></li>
                                                                                                                <li class="breadcrumb-item active" aria-current="page">Cars</li>
                                                                                        </ol>
            </nav>
        </div>
    </div>

    <div class="container py-5">
        <h2 class="mb-4 fw-bold">Cars</h2>
        
                    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
                                    <div class="col">
                        <a href="Sports%20Cars/index.html" class="text-decoration-none">
                            <div class="card">
                                <div class="card-img-top-wrapper">
                                                                            <img src="Sports%20Cars/car1.jpg" alt="Sports Cars" loading="lazy">
                                                                    </div>
                                <div class="card-body">
                                    <h5 class="card-title text-light mb-1">Sports Cars</h5>
                                                                            <p class="card-text text-muted small"><i class="bi bi-collection-fill me-1"></i>3 Photos</p>
                                                                    </div>
                            </div>
                        </a>
                    </div>
                            </div>
            
                        </div>

</body>
</html>
